<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Melodic</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; img-src 'self' file: data: https: http:; style-src 'self' 'unsafe-inline'; font-src 'self' file: data:;" />
  <link rel="stylesheet" href="../node_modules/katex/dist/katex.min.css" />
  <link rel="stylesheet" id="hljs-theme" href="../node_modules/highlight.js/styles/github.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" id="theme-css" href="css/theme-github.css" />
</head>
<body>
  <div id="drag-strip"></div>

  <div id="layout">
    <aside id="sidebar" class="hidden">
      <div class="sidebar-header">
        <div class="sidebar-tabs">
          <button id="tab-files" class="sidebar-tab active">Files</button>
          <button id="tab-outline" class="sidebar-tab">Outline</button>
        </div>
      </div>
      <div id="panel-files" class="sidebar-panel">
        <div id="file-tree"></div>
        <div id="file-empty" class="sidebar-empty">
          <button id="btn-open-folder">Open Folder…</button>
        </div>
      </div>
      <div id="panel-outline" class="sidebar-panel" style="display:none">
        <div id="outline"></div>
        <div id="outline-empty" class="sidebar-empty">No headings</div>
      </div>
      <div id="sidebar-resizer"></div>
    </aside>

    <main id="content">
      <div id="editor-scroll">
        <div id="write"></div>
      </div>
      <textarea id="source-editor" class="hidden" spellcheck="false"></textarea>
      <footer id="footer">
        <span id="word-count">0 words</span>
      </footer>
    </main>
  </div>

  <script src="dist/app.bundle.js"></script>
</body>
</html>
